version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  llm-engine:
    image: ollama/ollama:latest
    container_name: ollama-llm
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Auto-start Ollama server, wait for boot, pull model, then await termination
    entrypoint: [ "/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull phi3:mini && wait" ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi-gateway
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_BASE_URL=http://llm-engine:11434
      - OLLAMA_MODEL=phi3:mini
      - USE_CLOUD_API=False
    depends_on:
      qdrant:
        condition: service_healthy
      llm-engine:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
  ollama_data:
